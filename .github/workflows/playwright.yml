name: Cart API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Lets you trigger a run manually from the Actions tab.
  workflow_dispatch:
  # Optional: catch upstream API drift even without code changes.
  # schedule:
  #   - cron: '0 6 * * *' # daily at 06:00 UTC

jobs:
  test:
    name: Run Playwright API suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Browsers aren't strictly needed for API-only tests (no `page` is
      # used), but installed so the same workflow keeps working if/when
      # UI specs are added to this project later.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Cart CRUD test suite
        run: npx playwright test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 14

      - name: Upload JUnit / JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      # Surfaces pass/fail counts directly on the PR/commit checks page
      # using the JUnit report generated by playwright.config.js.
      - name: Publish test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false
