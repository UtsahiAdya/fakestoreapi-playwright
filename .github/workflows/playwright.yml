name: Cart API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Lets you trigger a run manually from the Actions tab.
  workflow_dispatch:
  # Optional: catch upstream API drift even without code changes.
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC

jobs:
  test:
    name: Run Playwright API suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Browsers aren't strictly needed for API-only tests (no `page` is
      # used), but installed so the same workflow keeps working if/when
      # UI specs are added to this project later.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Cart CRUD test suite
        id: run_tests
        # NON-BLOCKING BY DESIGN - see README "Known CI limitation".
        # GitHub-hosted runner IPs are shared, well-known, and are
        # sometimes blocklisted outright by third-party WAFs (GitHub's
        # own docs note runner IPs can be flagged as "malicious" or
        # "suspicious" by IP reputation services). When that happens
        # against FakeStoreAPI, EVERY request gets a static 403 - no
        # amount of retrying, backing off, or header tweaking fixes a
        # static IP-range block, so failing the build on that would
        # just be a false negative unrelated to this code. A human
        # reviews the uploaded report to distinguish that pattern from
        # a real regression (see README for how to tell them apart).
        continue-on-error: true
        run: npx playwright test

      - name: Flag likely upstream block vs real failure
        if: always()
        run: |
          if [ "${{ steps.run_tests.outcome }}" = "failure" ]; then
            echo "::warning::Playwright suite reported failures. Check playwright-report artifact: if EVERY test failed with 403/HTML body, this is very likely FakeStoreAPI blocking GitHub's shared runner IPs (see README 'Known CI limitation'), not a code regression. If only a SMALL, SPECIFIC set of tests failed with JSON error bodies, treat it as a real regression."
          fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 14

      - name: Upload JUnit / JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      # Surfaces pass/fail counts directly on the PR/commit checks page
      # using the JUnit report generated by playwright.config.js.
      - name: Publish test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false